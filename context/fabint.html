<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Fab Semiconductor Career Map</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --bg:#070a13;
  --text:#ffffff;
  --muted:#b9c4d8;
  --card:#ffffff14;
  --card2:#ffffff08;
  --border:#ffffff22;
  --panel:#05081488;
  --accent:#8eefff;
}

body.light{
  --bg:#f4f7fb;
  --text:#111827;
  --muted:#536174;
  --card:#ffffffcc;
  --card2:#eef4ffcc;
  --border:#d8e2f0;
  --panel:#ffffffd8;
  --accent:#2563eb;
}

body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  transition:.35s;
}

body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:-1;
  background:
    radial-gradient(circle at 15% 15%,#2563eb70,transparent 28%),
    radial-gradient(circle at 80% 20%,#06b6d455,transparent 24%),
    radial-gradient(circle at 70% 85%,#9333ea55,transparent 28%),
    linear-gradient(135deg,var(--bg),var(--bg));
}

.topbar{
  position:fixed;
  top:22px;
  right:8vw;
  z-index:10;
  display:flex;
  gap:12px;
}

.toggle{
  border:none;
  cursor:pointer;
  padding:12px 18px;
  border-radius:999px;
  color:var(--text);
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
}

.toggle:hover{
  transform:translateY(-2px);
}

header{
  padding:90px 8vw 35px;
}

.badge{
  display:inline-block;
  padding:10px 18px;
  border-radius:999px;
  background:var(--card);
  border:1px solid var(--border);
  color:var(--accent);
  margin-bottom:22px;
}

h1{
  max-width:950px;
  font-size:clamp(38px,7vw,82px);
  line-height:1;
  letter-spacing:-3px;
}

header p{
  margin-top:24px;
  max-width:760px;
  color:var(--muted);
  line-height:1.8;
  font-size:18px;
}

.toolbar{
  padding:10px 8vw 35px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}

.search,.filter{
  outline:none;
  color:var(--text);
  background:var(--card);
  border:1px solid var(--border);
  backdrop-filter:blur(16px);
}

.search{
  flex:1;
  min-width:260px;
  padding:17px 22px;
  border-radius:22px;
  font-size:16px;
}

.filter{
  padding:14px 20px;
  border-radius:999px;
  cursor:pointer;
}

.filter.active,.filter:hover{
  background:linear-gradient(135deg,#1ddcff,#7c3aed);
  color:white;
}

.grid{
  padding:0 8vw 80px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:24px;
}

.job-card{
  position:relative;
  min-height:280px;
  padding:30px;
  border-radius:36px;
  cursor:pointer;
  overflow:hidden;
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--border);
  box-shadow:0 28px 70px #00000025;
  transition:.35s;
}

.job-card::after{
  content:"";
  position:absolute;
  width:180px;
  height:180px;
  right:-65px;
  top:-65px;
  border-radius:50%;
  background:var(--glow);
  filter:blur(18px);
  opacity:.45;
}

.job-card:hover{
  transform:translateY(-10px) scale(1.015);
  border-color:#8eefff90;
}

.icon{
  width:64px;
  height:64px;
  border-radius:22px;
  display:grid;
  place-items:center;
  font-size:32px;
  background:var(--card);
  margin-bottom:24px;
}

.job-card h2{
  font-size:25px;
  margin-bottom:12px;
}

.job-card p{
  color:var(--muted);
  line-height:1.7;
}

.more{
  position:absolute;
  bottom:28px;
  left:30px;
  color:var(--accent);
  font-weight:700;
}

.detail{
  display:none;
  padding:70px 8vw 90px;
}

.back{
  border:none;
  padding:14px 22px;
  border-radius:999px;
  color:var(--text);
  background:var(--card);
  border:1px solid var(--border);
  cursor:pointer;
  margin-bottom:34px;
}

.detail-hero{
  position:relative;
  overflow:hidden;
  border-radius:46px;
  padding:45px;
  background:linear-gradient(145deg,var(--card),var(--card2));
  border:1px solid var(--border);
  box-shadow:0 30px 80px #00000025;
}

.detail-hero::before{
  content:"";
  position:absolute;
  width:360px;
  height:360px;
  right:-100px;
  top:-100px;
  border-radius:50%;
  background:var(--glow);
  filter:blur(28px);
  opacity:.35;
}

.detail-title{
  position:relative;
  max-width:850px;
}

.big-icon{
  font-size:58px;
  margin-bottom:16px;
}

.detail-title h2{
  font-size:clamp(36px,6vw,68px);
  line-height:1.05;
  margin-bottom:18px;
}

.detail-title p{
  color:var(--muted);
  line-height:1.9;
  font-size:18px;
}

.detail-grid{
  margin-top:28px;
  display:grid;
  grid-template-columns:1.2fr .8fr;
  gap:24px;
}

.info-box{
  padding:28px;
  border-radius:30px;
  background:var(--panel);
  border:1px solid var(--border);
}

.info-box h3{
  font-size:23px;
  margin-bottom:18px;
}

ul{list-style:none}

li{
  color:var(--muted);
  margin:12px 0;
  padding-left:25px;
  line-height:1.6;
  position:relative;
}

li::before{
  content:"";
  width:9px;
  height:9px;
  border-radius:50%;
  background:var(--accent);
  position:absolute;
  left:0;
  top:9px;
}

.path{
  margin-top:24px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:16px;
}

.path-card{
  padding:20px;
  border-radius:24px;
  background:var(--card);
  border:1px solid var(--border);
}

.path-card span{
  color:var(--accent);
  font-weight:800;
}

footer{
  text-align:center;
  color:var(--muted);
  padding:30px;
}

@media(max-width:850px){
  .detail-grid{grid-template-columns:1fr}
  .detail-hero{padding:30px}
  .topbar{position:static;padding:20px 8vw 0}
}
</style>
</head>

<body>
<div class="topbar">
  <button class="toggle" id="themeBtn">🌙 夜间</button>
  <button class="toggle" id="langBtn">EN</button>
</div>

<section id="home">
<header>
  <div class="badge" data-i18n="badge"></div>

  <p data-i18n="subtitle"></p>

<div class="toolbar">

  <button class="filter" data-type="tech" data-i18n="tech"></button>

  <button class="filter" data-type="support" data-i18n="support"></button>
</div>

<main class="grid" id="grid"></main>
</section>

<section class="detail" id="detail"></section>

<footer data-i18n="footer"></footer>

const grid = document.getElementById("grid");

function t(key){
  return ui[lang][key];
}

function applyLang(){
  document.documentElement.lang = lang === "zh" ? "zh-CN" : "en";
  document.querySelectorAll("[data-i18n]").forEach(el=>{
    el.textContent = t(el.dataset.i18n);
  });
  search.placeholder = t("search");
  langBtn.textContent = t("langBtn");
  updateThemeText();
  renderCards();

  if(detail.style.display === "block"){
    const index = Number(detail.dataset.index);
    showDetail(index,false);
  }
}

function updateThemeText(){
  themeBtn.textContent = document.body.classList.contains("light") ? t("themeLight") : t("themeDark");
}

  const keyword = search.value.toLowerCase();
  grid.innerHTML = "";

    const item = job[lang];
    const matchType = current === "all" || job.type === current;
    const text = JSON.stringify(item).toLowerCase();
    return matchType && text.includes(keyword);
  }).forEach((job,index)=>{
    const item = job[lang];
    const card = document.createElement("article");
    card.className = "job-card";
    card.style.setProperty("--glow",job.glow);
    card.innerHTML = `
      <div class="icon">${job.icon}</div>
      <h2>${item.title}</h2>
      <p>${item.brief}</p>
      <div class="more">${t("more")}</div>
    `;
    card.onclick = () => showDetail(index,true);
    grid.appendChild(card);
  });
}

function showDetail(index,scroll=true){
  const job = jobs[index];
  const item = job[lang];

  home.style.display = "none";
  detail.style.display = "block";
  detail.dataset.index = index;

  detail.innerHTML = `
    <button class="back" onclick="backHome()">${t("back")}</button>

    <div class="detail-hero" style="--glow:${job.glow}">
      <div class="detail-title">
        <div class="big-icon">${job.icon}</div>
        <h2>${item.title}<br><span style="color:var(--accent)">${item.en}</span></h2>
        <p>${item.intro}</p>
      </div>

      <div class="detail-grid">
        <div class="info-box">
          <h3>${t("works")}</h3>
          <ul>${item.works.map(x=>`<li>${x}</li>`).join("")}</ul>
        </div>

        <div class="info-box">
          <h3>${t("skills")}</h3>
          <ul>${item.skills.map(x=>`<li>${x}</li>`).join("")}</ul>
        </div>
      </div>

      <div class="detail-grid">
        <div class="info-box">
          <h3>${t("path")}</h3>
          <div class="path">
            ${item.path.map((p,i)=>`
              <div class="path-card">
                <span>0${i+1}</span>
                <p>${p}</p>
              </div>
            `).join("")}
          </div>
        </div>

        <div class="info-box">
          <h3>${t("fit")}</h3>
          <p style="color:var(--muted);line-height:1.8">${item.fit}</p>
        </div>
      </div>
    </div>
  `;

  if(scroll) window.scrollTo({top:0,behavior:"smooth"});
}

function backHome(){
  detail.style.display = "none";
  home.style.display = "block";
  window.scrollTo({top:0,behavior:"smooth"});
}

themeBtn.onclick = () => {
  document.body.classList.toggle("light");
  updateThemeText();
};

langBtn.onclick = () => {
  lang = lang === "zh" ? "en" : "zh";
  applyLang();
};

filters.forEach(btn=>{
  btn.onclick = ()=>{
    filters.forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    current = btn.dataset.type;
    renderCards();
  };
});

search.oninput = renderCards;

applyLang();
</script>
</body>
</html>
