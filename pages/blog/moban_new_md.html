    <script>
        // 检查marked是否加载成功，如果失败则加载备用CDN
        if (typeof marked === 'undefined') {
            console.warn('主CDN加载失败，尝试备用CDN');
            document.write('<script src="https://unpkg.com/marked@2.1.3/marked.min.js"><\/script>');
        }
        
        // 检查hljs是否加载成功
        if (typeof hljs === 'undefined') {
            console.warn('highlight.js主CDN加载失败，尝试备用CDN');
            document.write('<script src="https://unpkg.com/@highlightjs/cdn-assets@11.7.0/highlight.min.js"><\/script>');
        }
        
        // 检查Mermaid是否加载成功
        if (typeof mermaid === 'undefined') {
            console.warn('Mermaid主CDN加载失败，尝试备用CDN');
            document.write('<script src="https://unpkg.com/mermaid@10.9.0/dist/mermaid.min.js"><\/script>');
        }

        // 检查KaTeX是否加载成功
        window.addEventListener('DOMContentLoaded', function() {
            if (typeof katex === 'undefined') {
                console.warn('KaTeX主CDN加载失败，尝试备用CDN');
                const katexCSS = document.createElement('link');
                katexCSS.rel = 'stylesheet';
                katexCSS.href = 'https://unpkg.com/katex@0.16.9/dist/katex.min.css';
                document.head.appendChild(katexCSS);
                
                const katexJS = document.createElement('script');
                katexJS.src = 'https://unpkg.com/katex@0.16.9/dist/katex.min.js';
                document.head.appendChild(katexJS);
                
                const autoRenderJS = document.createElement('script');
                autoRenderJS.src = 'https://unpkg.com/katex@0.16.9/dist/contrib/auto-render.min.js';
                document.head.appendChild(autoRenderJS);
            }
        });
    </script>

    <!-- 页面主脚本 -->
    <script>
        // 页面配置
        const PAGE_CONFIG = {
            defaultMarkdownFile: '../../context/test_zh.md',
            articleMeta: {
                title: 'Markdown测试文章',
                title_en: 'Markdown Test Article',
                date: new Date().toISOString().split('T')[0],
                category: '技术',
                category_en: 'Technology',
                tags: ['Markdown', '博客', '测试'],
                tags_en: ['Markdown', 'Blog', 'Test']
            }
        };

        let markdownRenderer;
        let currentMarkdownFile;
        /** URL 或默认中的「逻辑路径」，用于 _zh/_en 配对；不随语言改写查询串 */
        let mdBaseFromUrl = '';
        let isFullscreen = false;
        let mdTocScrollTick = false;

        function getCurrentLang() {
            return document.body.classList.contains('en') ? 'en' : 'zh';
        }

        async function mdFileExists(url) {
            try {
                let r = await fetch(url, { method: 'HEAD', cache: 'no-cache' });
                if (r.ok) return true;
                r = await fetch(url, { cache: 'no-cache' });
                return r.ok;
            } catch (e) {
                return false;
            }
        }

        /**
         * 根据语言解析要加载的 md 路径：
         * - xxx_zh.md <-> xxx_en.md
         * - 无后缀对时：英文优先 xxx_en.md；中文优先 xxx_zh.md（存在才用），否则原文件
         */
        async function resolveMarkdownPathForLanguage(basePath, lang) {
            if (!basePath) return basePath;
            const zhPair = basePath.match(/^(.+)_zh\.md$/i);
            if (zhPair) {
                return lang === 'zh' ? basePath : zhPair[1] + '_en.md';
            }
            const enPair = basePath.match(/^(.+)_en\.md$/i);
            if (enPair) {
                return lang === 'en' ? basePath : enPair[1] + '_zh.md';
            }
            if (lang === 'en') {
                const enTry = basePath.replace(/\.md$/i, '_en.md');
                if (enTry !== basePath && await mdFileExists(enTry)) return enTry;
                return basePath;
            }
            const zhTry = basePath.replace(/\.md$/i, '_zh.md');
            if (zhTry !== basePath && await mdFileExists(zhTry)) return zhTry;
            return basePath;
        }

        window.addEventListener('sitewide-language-change', async function() {
            if (!markdownRenderer || !mdBaseFromUrl) return;
            await loadAndRenderMarkdown();
            syncMdChromeI18n();
        });

        // 从URL参数获取Markdown文件路径
        function getMarkdownFileFromURL() {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get('md') || urlParams.get('file');
        }

        function syncMdChromeI18n() {
            const lang = getCurrentLang();
            document.querySelectorAll('.md-icon-action[data-zh-tooltip]').forEach(function (btn) {
                const t = btn.getAttribute(lang === 'en' ? 'data-en-tooltip' : 'data-zh-tooltip');
                if (t) btn.setAttribute('title', t);
            });
            const drawerBtn = document.getElementById('md-sidebar-drawer-btn');
            if (drawerBtn) {
                const collapsed = document.getElementById('md-article-layout').classList.contains('md-layout--sidebar-collapsed');
                const showZh = lang === 'zh';
                if (collapsed) {
                    drawerBtn.setAttribute('title', showZh ? '展开侧栏' : 'Show sidebar');
                } else {
                    const dt = drawerBtn.getAttribute(showZh ? 'data-zh-title' : 'data-en-title');
                    if (dt) drawerBtn.setAttribute('title', dt);
                }
            }
        }

        function initSidebarDrawer() {
            const layout = document.getElementById('md-article-layout');
            const btn = document.getElementById('md-sidebar-drawer-btn');
            if (!layout || !btn) return;
            btn.addEventListener('click', function () {
                const collapsed = layout.classList.toggle('md-layout--sidebar-collapsed');
                btn.classList.toggle('md-sidebar-drawer-btn--collapsed', collapsed);
                btn.setAttribute('aria-expanded', collapsed ? 'false' : 'true');
                const lang = getCurrentLang();
                if (collapsed) {
                    btn.setAttribute('title', lang === 'zh' ? '展开侧栏' : 'Show sidebar');
                } else {
                    syncMdChromeI18n();
                }
            });
        }

        function initTocBranchToggles(root) {
            if (!root) return;
            root.querySelectorAll('.toc-branch-toggle').forEach(function (toggleBtn) {
                toggleBtn.addEventListener('click', function (e) {
                    e.preventDefault();
                    e.stopPropagation();
                    const branch = toggleBtn.closest('.toc-branch');
                    if (!branch) return;
                    const open = branch.getAttribute('data-open') === 'true';
                    const next = !open;
                    branch.setAttribute('data-open', next ? 'true' : 'false');
                    toggleBtn.setAttribute('aria-expanded', next ? 'true' : 'false');
                    toggleBtn.classList.toggle('toc-branch-toggle--collapsed', !next);
                });
            });
        }

        // 页面初始化
        document.addEventListener('DOMContentLoaded', async function() {
            markdownRenderer = new MarkdownRenderer();
            mdBaseFromUrl = getMarkdownFileFromURL() || PAGE_CONFIG.defaultMarkdownFile;

            await loadAndRenderMarkdown();

            initPageFeatures();
            initSidebarDrawer();
            initThemeToggle();
            syncMdChromeI18n();
        });

        async function loadAndRenderMarkdown() {
            try {
                showLoadingState();

                const lang = getCurrentLang();
                let path = await resolveMarkdownPathForLanguage(mdBaseFromUrl, lang);
                let markdownText;

                try {
                    markdownText = await markdownRenderer.loadMarkdownFile(path);
                    currentMarkdownFile = path;
                } catch (primaryErr) {
                    if (path !== mdBaseFromUrl) {
                        markdownText = await markdownRenderer.loadMarkdownFile(mdBaseFromUrl);
                        currentMarkdownFile = mdBaseFromUrl;
                    } else {
                        throw primaryErr;
                    }
                }

                const result = await markdownRenderer.renderMarkdown(
                    markdownText,
                    document.getElementById('markdown-content')
                );

                updateTableOfContents(result.toc);
                updatePageMetadata(markdownText);
                hideLoadingState();
                syncMdChromeI18n();

            } catch (error) {
                console.error('加载Markdown文件失败:', error);
                showErrorState(error.message);
            }
        }

        // 显示加载状态
        function showLoadingState() {
            const content = document.getElementById('markdown-content');
            const toc = document.getElementById('toc-content');
            
            content.innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text" data-en="Loading article content..." data-zh="正在加载文章内容...">正在加载文章内容...</div>
                </div>
            `;
            
            toc.innerHTML = `
                <div class="loading-container">
                    <div class="loading-spinner"></div>
                    <div class="loading-text" data-en="Loading..." data-zh="加载中...">加载中...</div>
                </div>
            `;
        }

        // 隐藏加载状态
        function hideLoadingState() {
            // 加载状态会被实际内容替换，无需特殊处理
        }

        // 显示错误状态
        function showErrorState(errorMessage) {
            const content = document.getElementById('markdown-content');
            const currentLang = document.body.classList.contains('en') ? 'en' : 'zh';
            
            const errorText = currentLang === 'en' 
                ? `Failed to load article: ${errorMessage}` 
                : `加载文章失败：${errorMessage}`;
            
            content.innerHTML = `
                <div class="error-container">
                    <h3><i class="fas fa-exclamation-triangle"></i> ${currentLang === 'en' ? 'Error' : '错误'}</h3>
                    <p>${errorText}</p>
                    <p>${currentLang === 'en' ? 'Please check the file path or try again later.' : '请检查文件路径或稍后重试。'}</p>
                </div>
            `;
            
            // 更新目录为错误状态
            const toc = document.getElementById('toc-content');
            toc.innerHTML = `<p class="no-toc">${currentLang === 'en' ? 'Unable to load table of contents' : '无法加载目录'}</p>`;
        }

        // 更新目录
        function updateTableOfContents(tocItems) {
            const tocContent = document.getElementById('toc-content');
            
            if (!tocItems || tocItems.length === 0) {
                const currentLang = document.body.classList.contains('en') ? 'en' : 'zh';
                tocContent.innerHTML = `<p class="no-toc">${currentLang === 'en' ? 'No table of contents available' : '本文暂无目录'}</p>`;
                return;
            }
            
            tocContent.innerHTML = markdownRenderer.generateTOCHTML();

            initTocBranchToggles(tocContent);

            const tocLinks = tocContent.querySelectorAll('.toc-link');
            tocLinks.forEach(link => {
                link.addEventListener('click', function(e) {
                    e.preventDefault();
                    const targetId = this.getAttribute('href').substring(1);
                    const targetElement = document.getElementById(targetId);

                    if (targetElement) {
                        targetElement.scrollIntoView({
                            behavior: 'smooth',
                            block: 'start'
                        });

                        tocLinks.forEach(l => l.classList.remove('active'));
                        this.classList.add('active');

                        history.pushState(null, null, this.getAttribute('href'));
                    }
                });
            });
        }

        // 更新页面元数据（正文语言由当前加载的 md 决定，标题取该文件首行 #）
        function updatePageMetadata(markdownText) {
            const titleMatch = markdownText.match(/^#\s+(.+)$/m);
            const extractedTitle = titleMatch ? titleMatch[1].trim() : null;
            const lang = getCurrentLang();
            const fallback = lang === 'en' ? PAGE_CONFIG.articleMeta.title_en : PAGE_CONFIG.articleMeta.title;
            const pageTitle = extractedTitle || fallback;

            document.getElementById('page-title').textContent = `${pageTitle} - HealthJian的博客`;

            const titleEl = document.getElementById('article-title-text');
            if (titleEl) titleEl.textContent = pageTitle;
            
            // 更新日期
            document.getElementById('post-date').textContent = PAGE_CONFIG.articleMeta.date;
            
            // 更新分类
            const categoryElement = document.getElementById('post-category');
            categoryElement.setAttribute('data-zh', PAGE_CONFIG.articleMeta.category);
            categoryElement.setAttribute('data-en', PAGE_CONFIG.articleMeta.category_en);
            categoryElement.textContent = PAGE_CONFIG.articleMeta.category;
            
            // 更新标签
            const tagsContainer = document.getElementById('post-tags');
            const currentLang = document.body.classList.contains('en') ? 'en' : 'zh';
            const tags = currentLang === 'en' ? PAGE_CONFIG.articleMeta.tags_en : PAGE_CONFIG.articleMeta.tags;
            
            tagsContainer.innerHTML = '';
            tags.forEach(tag => {
                const tagElement = document.createElement('span');
                tagElement.className = 'tag';
                tagElement.textContent = tag;
                tagsContainer.appendChild(tagElement);
            });
        }

        // 初始化页面功能
        function initPageFeatures() {
            // 打印功能
            document.getElementById('print-btn').addEventListener('click', function() {
                window.print();
            });
            
            // 分享功能
            document.getElementById('share-btn').addEventListener('click', function() {
                if (navigator.share) {
                    navigator.share({
                        title: document.title,
                        url: window.location.href
                    });
                } else {
                    // 降级处理：复制链接
                    navigator.clipboard.writeText(window.location.href).then(() => {
                        const currentLang = document.body.classList.contains('en') ? 'en' : 'zh';
                        const message = currentLang === 'en' ? 'Link copied to clipboard!' : '链接已复制到剪贴板！';
                        alert(message);
                    });
                }
            });
            
            // 全屏功能
            document.getElementById('fullscreen-btn').addEventListener('click', function() {
                toggleFullscreen();
            });
            
            window.addEventListener('scroll', function() {
                if (!mdTocScrollTick) {
                    requestAnimationFrame(updateActiveTocItem);
                    mdTocScrollTick = true;
                }
            });
        }

        // 切换全屏模式
        function toggleFullscreen() {
            const button = document.getElementById('fullscreen-btn');
            const icon = button.querySelector('i');
            
            if (!isFullscreen) {
                // 进入全屏
                document.documentElement.requestFullscreen();
                icon.className = 'fas fa-compress';
                isFullscreen = true;
            } else {
                // 退出全屏
                document.exitFullscreen();
                icon.className = 'fas fa-expand';
                isFullscreen = false;
            }
        }

        // 更新活动的目录项
        function updateActiveTocItem() {
            const headings = document.querySelectorAll('.markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4, .markdown-content h5, .markdown-content h6');
            const tocLinks = document.querySelectorAll('.toc-link');
            
            let activeHeading = null;
            const scrollTop = window.pageYOffset;
            
            // 找到当前可见的标题
            headings.forEach(heading => {
                const rect = heading.getBoundingClientRect();
                if (rect.top <= 100) {
                    activeHeading = heading;
                }
            });
            
            // 更新目录活动状态
            tocLinks.forEach(link => {
                link.classList.remove('active');
                if (activeHeading && link.getAttribute('href') === `#${activeHeading.id}`) {
                    link.classList.add('active');
                }
            });
            
            mdTocScrollTick = false;
        }

        // 初始化主题切换监听
        function initThemeToggle() {
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    // 延迟执行以确保主题已切换
                    setTimeout(() => {
                        updateHighlightTheme();
                    }, 100);
                });
            }
            
            // 初始化时设置正确的高亮主题
            updateHighlightTheme();
        }

        // 更新代码高亮主题
        function updateHighlightTheme() {
            const lightTheme = document.getElementById('hljs-light');
            const darkTheme = document.getElementById('hljs-dark');
            const isDarkMode = document.body.classList.contains('dark-mode');
            
            if (lightTheme && darkTheme) {
                lightTheme.disabled = isDarkMode;
                darkTheme.disabled = !isDarkMode;
            }
        }

        // 监听全屏变化
        document.addEventListener('fullscreenchange', function() {
            if (!document.fullscreenElement) {
                const button = document.getElementById('fullscreen-btn');
                const icon = button.querySelector('i');
                icon.className = 'fas fa-expand';
                isFullscreen = false;
            }
        });
    </script>
</body>
</html>
