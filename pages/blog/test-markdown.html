        function checkDependencies() {
            const statusContainer = document.getElementById('status-container');
            const controls = document.getElementById('controls');
            let coreOk = true;
            
            statusContainer.innerHTML = '';
            
            const deps = [
                { name: 'marked.js',          check: () => typeof marked !== 'undefined',          required: true },
                { name: 'highlight.js',        check: () => typeof hljs !== 'undefined',            required: true },
                { name: 'MarkdownRenderer',    check: () => typeof MarkdownRenderer !== 'undefined', required: true },
                { name: 'KaTeX',               check: () => typeof katex !== 'undefined',           required: false },
                { name: 'Mermaid',             check: () => typeof mermaid !== 'undefined',         required: false },
            ];

            deps.forEach(d => {
                const ok = d.check();
                if (ok) {
                    statusContainer.innerHTML += '<div class="status success">OK - ' + d.name + '</div>';
                } else if (d.required) {
                    statusContainer.innerHTML += '<div class="status error">FAIL - ' + d.name + '</div>';
                    coreOk = false;
                } else {
                    statusContainer.innerHTML += '<div class="status warn">SKIP - ' + d.name + '（可选，部分测试不可用）</div>';
                }
            });

            if (coreOk) {
                try {
                    renderer = new MarkdownRenderer();
                    statusContainer.innerHTML += '<div class="status success">OK - MarkdownRenderer 初始化成功</div>';
                } catch (error) {
                    statusContainer.innerHTML += '<div class="status error">FAIL - MarkdownRenderer 初始化: ' + error.message + '</div>';
                    coreOk = false;
                }
            }
            
            if (coreOk) {
                statusContainer.innerHTML += '<div class="status success">ALL CORE DEPS READY</div>';
                controls.style.display = 'block';
            } else {
                statusContainer.innerHTML += '<div class="status error">核心依赖加载失败，请检查网络或 CDN</div>';

from typing import List

def quicksort(arr: List[int]) -> List[int]:
    if len(arr) <= 1:
        return arr
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    return quicksort(left) + middle + quicksort(right)

## 1. Transformer 自注意力机制

自注意力的核心计算为：

$$
\\text{Attention}(Q, K, V) = \\text{softmax}\\left(\\frac{QK^T}{\\sqrt{d_k}}\\right)V
$$

其中 $Q$、$K$、$V$ 分别是查询、键、值矩阵，$d_k$ 是键向量维度。

## 2. 架构流程

\`\`\`mermaid
graph LR
    A[输入 Embedding] --> B[Multi-Head Attention]

## 3. 实现代码

\`\`\`python
import torch
import torch.nn as nn

class SelfAttention(nn.Module):
    def __init__(self, d_model, n_heads):
        super().__init__()
        self.n_heads = n_heads
        self.d_k = d_model // n_heads
        self.W_q = nn.Linear(d_model, d_model)
        self.W_k = nn.Linear(d_model, d_model)
        self.W_v = nn.Linear(d_model, d_model)

    def forward(self, x):
        Q = self.W_q(x)
        K = self.W_k(x)
        V = self.W_v(x)
        scores = torch.matmul(Q, K.transpose(-2, -1)) / (self.d_k ** 0.5)
        attn = torch.softmax(scores, dim=-1)
        return torch.matmul(attn, V)
\`\`\`

        function testLanguagePairResolve() {
            const result = document.getElementById('result');
            const testCases = [
                { input: '../../context/20260420_zh.md',   lang: 'en', expected: '../../context/20260420_en.md',   desc: '无编号 zh->en' },
                { input: '../../context/20260420_en.md',   lang: 'zh', expected: '../../context/20260420_zh.md',   desc: '无编号 en->zh' },
                { input: '../../context/20260421_zh_1.md', lang: 'en', expected: '../../context/20260421_en_1.md', desc: '带编号 zh_1->en_1' },
                { input: '../../context/20260421_en_2.md', lang: 'zh', expected: '../../context/20260421_zh_2.md', desc: '带编号 en_2->zh_2' },
                { input: '../../context/20260421_zh_3.md', lang: 'en', expected: '../../context/20260421_en_3.md', desc: '带编号 zh_3->en_3' },
                { input: '../../context/20260421_zh_1.md', lang: 'zh', expected: '../../context/20260421_zh_1.md', desc: '同语言不变 zh_1->zh_1' },
                { input: '../../context/20260420_zh.md',   lang: 'zh', expected: '../../context/20260420_zh.md',   desc: '同语言不变 zh->zh' },
                { input: '../../context/test.md',          lang: 'en', expected: null,                            desc: '无后缀文件(异步)' },
            ];

            let html = '<h3>语言配对解析测试 (resolveMarkdownPathForLanguage 正则验证)</h3>';

            const zhNumRe = /^(.+)_zh(_\d+)\.md$/i;
            const enNumRe = /^(.+)_en(_\d+)\.md$/i;
            const zhRe    = /^(.+)_zh\.md$/i;
            const enRe    = /^(.+)_en\.md$/i;

            function resolveSync(basePath, lang) {
                const zhNum = basePath.match(zhNumRe);
                if (zhNum) return lang === 'zh' ? basePath : zhNum[1] + '_en' + zhNum[2] + '.md';
                const enNum = basePath.match(enNumRe);
                if (enNum) return lang === 'en' ? basePath : enNum[1] + '_zh' + enNum[2] + '.md';
                const zh = basePath.match(zhRe);
                if (zh) return lang === 'zh' ? basePath : zh[1] + '_en.md';
                const en = basePath.match(enRe);
                if (en) return lang === 'en' ? basePath : en[1] + '_zh.md';
                return null;
            }

            let passed = 0, failed = 0;

            testCases.forEach(tc => {
                const actual = resolveSync(tc.input, tc.lang);
                const ok = actual === tc.expected;
                if (ok) passed++; else failed++;
                const icon = ok ? 'OK' : 'FAIL';
                const cls = ok ? 'success' : 'error';
                html += '<div class="status ' + cls + '">' + icon + ' - ' + tc.desc
                    + ' | 输入: ' + tc.input + ' [' + tc.lang + ']'
                    + ' | 期望: ' + (tc.expected || '(需异步)') + ' | 实际: ' + (actual || '(null/异步)') + '</div>';
            });

            html += '<div class="status ' + (failed === 0 ? 'success' : 'error') + '">'
                + '结果: ' + passed + ' 通过, ' + failed + ' 失败</div>';

            result.innerHTML = html;
        }

            const summaryParts = [];

            for (const t of tests) {
                try {
                    await new Promise((resolve, reject) => {
                        const origResult = document.getElementById('result');
                        const tmpDiv = document.createElement('div');
                        tmpDiv.id = 'result';
                        origResult.parentNode.replaceChild(tmpDiv, origResult);

                        const origRenderTest = window._origRenderTest || renderTest;
                        window._origRenderTest = origRenderTest;

                        t.fn();

                        setTimeout(() => {
                            tmpDiv.id = '';
                            tmpDiv.parentNode.replaceChild(origResult, tmpDiv);
                            passed++;
                            summaryParts.push('<div class="status success">OK - ' + t.name + '</div>');
                            resolve();
                        }, 200);
                    });
                } catch (e) {
                    failed++;
                    summaryParts.push('<div class="status error">FAIL - ' + t.name + ': ' + e.message + '</div>');
                }
            }

            testLanguagePairResolve();
            const langResult = document.getElementById('result').innerHTML;
            const langPassed = !langResult.includes('FAIL -');
            if (langPassed) { passed++; } else { failed++; }
            summaryParts.push('<div class="status ' + (langPassed ? 'success' : 'error') + '">' + (langPassed ? 'OK' : 'FAIL') + ' - 语言配对解析</div>');

            result.innerHTML = '<h3>全部测试结果</h3>'
                + summaryParts.join('')
                + '<div class="status ' + (failed === 0 ? 'success' : 'error') + '">总计: ' + passed + ' 通过, ' + failed + ' 失败</div>';
        }

        // ========== 渲染核心 ==========

        async function renderTest(markdown, testName) {
            const result = document.getElementById('result');
            
            try {
                result.innerHTML = '<div class="status info">正在渲染: ' + testName + ' ...</div>';
                
                const renderResult = await renderer.renderMarkdown(markdown, null);
                
                result.innerHTML = `
                    <div class="status success">OK - ${testName}</div>
                    <h3>渲染结果:</h3>
                    <div class="render-box">${renderResult.html}</div>
                    <h3>目录信息:</h3>
                    <pre>${JSON.stringify(renderResult.toc, null, 2)}</pre>
                `;
                
            } catch (error) {
                result.innerHTML = '<div class="status error">FAIL - ' + testName + ': ' + error.message + '</div>';
                console.error('渲染错误:', error);
            }
        }
        
        window.addEventListener('load', function() {
            setTimeout(checkDependencies, 200);
        });
    </script>
</body>
</html>
