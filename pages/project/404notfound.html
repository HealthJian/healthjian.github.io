<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - HealthJian</title>
    <link rel="shortcut icon" href="../../images/favicon.ico" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #007AFF;
            --secondary: #5AC8FA;
            --bg: #f9f7f2;
            --card-bg: #ffffff;
            --navbar-bg: rgba(250,235,215,0.82);
            --text: #1a1a1a;
            --text-muted: #6b7280;
            --border: rgba(0,0,0,0.06);
            --shadow: rgba(0,0,0,0.08);
            --mono: 'JetBrains Mono','Consolas','Source Code Pro',monospace;
            --sans: 'SF Pro Display',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
        }

        body.dark-mode {
            --primary: #5AC8FA;
            --secondary: #007AFF;
            --bg: #003366;
            --card-bg: #004080;
            --navbar-bg: rgba(0,51,102,0.85);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --border: rgba(255,255,255,0.08);
            --shadow: rgba(0,0,0,0.3);
        }

        *{margin:0;padding:0;box-sizing:border-box}

        body {
            font-family: var(--sans);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background .35s, color .35s;
            overflow-x: hidden;
        }

        a { text-decoration:none; color:inherit; }
        ul { list-style:none; }

        /* ---- Navbar ---- */
        .navbar {
            position: fixed; top:0; left:0; width:100%;
            height: 60px;
            display: flex; justify-content:space-between; align-items:center;
            padding: 0 5%;
            background: var(--navbar-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            transition: background .35s;
        }

        .nav-left .logo {
            display:flex; align-items:center; gap:10px;
            font-weight:600; font-size:1.1rem; color:var(--text);
        }
        .nav-left .logo img {
            width:32px; height:32px; border-radius:50%;
            transition: transform .3s;
        }
        .nav-left .logo:hover img { transform:rotate(12deg) scale(1.1); }

        .nav-right { display:flex; align-items:center; gap:18px; }
        .menu { display:flex; gap:16px; }
        .menu a { font-weight:500; font-size:.9rem; transition:color .3s; position:relative; }
        .menu a::after {
            content:''; position:absolute; width:0; height:2px;
            bottom:-4px; left:0; background:var(--primary);
            transition:width .3s;
        }
        .menu a:hover { color:var(--primary); }
        .menu a:hover::after { width:100%; }

        .social-icons a, .theme-toggle, .lang-toggle {
            background:none; border:none; cursor:pointer;
            font-size:1rem; color:var(--text-muted);
            display:flex; align-items:center; justify-content:center;
            transition: color .3s, transform .3s;
        }
        .social-icons a:hover,.theme-toggle:hover,.lang-toggle:hover {
            color:var(--primary); transform:translateY(-2px);
        }

        .theme-toggle i.fa-sun { display:none; }
        body.dark-mode .theme-toggle i.fa-moon { display:none; }
        body.dark-mode .theme-toggle i.fa-sun { display:block; }

        .lang-toggle {
            font-weight:600; font-size:.85rem;
            width:28px; height:28px; border-radius:50%;
            background:rgba(128,128,128,0.08);
        }

        /* ---- Particle Canvas ---- */
        #particleCanvas {
            position:fixed; top:0; left:0; width:100%; height:100%;
            pointer-events:none; z-index:0;
            opacity:.3;
        }
        body.dark-mode #particleCanvas { opacity:.45; }

        /* ---- Main ---- */
        main {
            flex:1; position:relative; z-index:10;
            display:flex; align-items:center; justify-content:center;
            padding: 100px 20px 60px;
        }

        .error-card {
            max-width: 560px; width:100%;
            text-align:center;
            padding: 48px 40px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px var(--shadow);
            backdrop-filter: blur(10px);
            animation: cardIn .7s cubic-bezier(.2,.8,.2,1) forwards;
            transition: background .35s, box-shadow .35s;
        }
        @keyframes cardIn {
            from { opacity:0; transform:translateY(24px); }
            to { opacity:1; transform:translateY(0); }
        }
        .error-card:hover {
            box-shadow: 0 12px 40px var(--shadow);
        }

        /* Terminal-style prompt */
        .terminal-prompt {
            display:inline-block;
            font-family:var(--mono);
            font-size:.82rem;
            color:var(--primary);
            background: rgba(0,122,255,0.08);
            padding:5px 14px;
            border-radius:999px;
            border:1px solid rgba(0,122,255,0.15);
            margin-bottom:28px;
            letter-spacing:.5px;
        }
        body.dark-mode .terminal-prompt {
            background:rgba(90,200,250,0.1);
            border-color:rgba(90,200,250,0.2);
        }

        /* 404 number with glitch effect */
        .error-code {
            font-family:var(--mono);
            font-size: 7.5rem;
            font-weight:700;
            line-height:1;
            color:var(--primary);
            letter-spacing:-4px;
            margin-bottom:12px;
            position:relative;
            display:inline-block;
            animation: glitchShake 4s ease-in-out infinite;
        }
        .error-code::before,
        .error-code::after {
            content:'404';
            position:absolute; top:0; left:0;
            width:100%; height:100%;
            opacity:0;
        }
        .error-code::before {
            color:var(--secondary);
            animation: glitchTop 4s ease-in-out infinite;
            clip-path: inset(0 0 60% 0);
        }
        .error-code::after {
            color:#ff3b30;
            animation: glitchBottom 4s ease-in-out infinite;
            clip-path: inset(60% 0 0 0);
        }

        @keyframes glitchShake {
            0%,90%,100% { transform:translate(0); }
            92% { transform:translate(-2px,1px); }
            94% { transform:translate(2px,-1px); }
            96% { transform:translate(-1px,2px); }
            98% { transform:translate(1px,-1px); }
        }
        @keyframes glitchTop {
            0%,90%,100% { opacity:0; transform:translate(0); }
            92% { opacity:.7; transform:translate(3px,-2px); }
            94% { opacity:0; }
            96% { opacity:.5; transform:translate(-2px,1px); }
            98% { opacity:0; }
        }
        @keyframes glitchBottom {
            0%,90%,100% { opacity:0; transform:translate(0); }
            93% { opacity:.6; transform:translate(-3px,2px); }
            95% { opacity:0; }
            97% { opacity:.4; transform:translate(2px,-1px); }
            99% { opacity:0; }
        }

        .error-title {
            font-size:1.5rem; font-weight:600;
            color:var(--text);
            margin-bottom:14px;
            transition: color .35s;
        }

        .error-message {
            font-size:.95rem;
            color:var(--text-muted);
            line-height:1.8;
            margin-bottom:32px;
            transition: color .35s;
        }

        /* Terminal-style error log */
        .error-log {
            font-family:var(--mono);
            font-size:.78rem;
            text-align:left;
            background:rgba(0,0,0,0.03);
            border:1px solid var(--border);
            border-radius:10px;
            padding:14px 18px;
            margin-bottom:28px;
            color:var(--text-muted);
            line-height:1.8;
        }
        body.dark-mode .error-log {
            background:rgba(255,255,255,0.03);
        }
        .error-log .log-prefix { color:var(--primary); font-weight:600; }
        .error-log .log-warn { color:#ff9500; }
        .error-log .log-err { color:#ff3b30; }

        /* Buttons */
        .btn-group {
            display:flex; gap:14px; justify-content:center;
            flex-wrap:wrap;
        }

        .btn-primary, .btn-secondary {
            display:inline-flex; align-items:center; gap:8px;
            padding: 12px 28px;
            border-radius:10px;
            font-weight:600; font-size:.9rem;
            transition: all .3s cubic-bezier(.4,0,.2,1);
            border:none; cursor:pointer;
        }

        .btn-primary {
            background:var(--primary);
            color:#fff;
            box-shadow:0 4px 14px rgba(0,122,255,0.25);
        }
        .btn-primary:hover {
            transform:translateY(-2px);
            box-shadow:0 6px 20px rgba(0,122,255,0.35);
        }

        .btn-secondary {
            background:var(--card-bg);
            color:var(--text);
            border:1px solid var(--border);
            box-shadow:0 2px 8px var(--shadow);
        }
        .btn-secondary:hover {
            transform:translateY(-2px);
            border-color:var(--primary);
            color:var(--primary);
        }

        /* ---- Footer ---- */
        .simple-footer {
            position:relative; z-index:10;
            text-align:center;
            padding:20px;
            font-size:.82rem;
            color:var(--text-muted);
            border-top:1px solid var(--border);
            background:var(--navbar-bg);
            backdrop-filter:blur(10px);
            transition: background .35s, color .35s;
        }
        .simple-footer a { color:var(--primary); }
        .simple-footer a:hover { text-decoration:underline; }

        /* ---- Responsive ---- */
        @media (max-width:768px) {
            .menu { display:none; }
            .error-code { font-size:5rem; letter-spacing:-2px; }
            .error-title { font-size:1.25rem; }
            .error-card { padding:36px 24px; }
            .error-log { font-size:.72rem; padding:10px 14px; }
        }

        @media (max-width:420px) {
            .error-code { font-size:4rem; }
            .error-card { padding:28px 18px; border-radius:14px; }
            .btn-primary,.btn-secondary { padding:10px 20px; font-size:.85rem; }
            .navbar { padding:0 3%; }
        }

        @media (prefers-reduced-motion:reduce) {
            .error-code,.error-code::before,.error-code::after { animation:none; }
            .error-card { animation:none; opacity:1; transform:none; }
        }
    </style>
</head>
<body class="light-mode">
    <!-- Particle Background -->
    <canvas id="particleCanvas"></canvas>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-left">
            <a href="../../index.html" class="logo">
                <img src="https://avatars.githubusercontent.com/u/74038190?v=4" alt="Logo" onerror="this.src='https://ui-avatars.com/api/?name=HJ&background=007AFF&color=fff'">
                <span class="site-name" data-en="HealthJian" data-zh="HealthJian">HealthJian</span>
            </a>
        </div>
        <div class="nav-right">
            <ul class="menu">
                <li><a href="../../index.html" data-en="Home" data-zh="首页">首页</a></li>
                <li><a href="../blog.html" data-en="Blog" data-zh="博客">博客</a></li>
                <li><a href="project.html" data-en="Projects" data-zh="项目">项目</a></li>
                <li><a href="../links.html" data-en="Links" data-zh="链接">链接</a></li>
                <li><a href="../about.html" data-en="About" data-zh="关于">关于</a></li>
            </ul>
            <div class="social-icons">
                <a href="https://github.com/CaiNiaojian" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
            </div>
            <button id="theme-toggle" class="theme-toggle" title="Toggle theme">
                <i class="fas fa-moon"></i>
                <i class="fas fa-sun"></i>
            </button>
            <button id="lang-toggle" class="lang-toggle" title="Toggle language">
                <span class="lang-text" data-en="EN" data-zh="中">中</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="error-card">
            <div class="terminal-prompt">$ curl -I this-page</div>
            <h1 class="error-code">404</h1>
            <h2 class="error-title">
                <span class="lang-content" data-zh="页面未找到" data-en="Page Not Found">页面未找到</span>
            </h2>
            <p class="error-message">
                <span class="lang-content"
                    data-zh="目标资源不存在或已被移动。请检查 URL 路径，或通过下方按钮导航回安全区域。"
                    data-en="The requested resource does not exist or has been moved. Please verify the URL, or navigate back using the buttons below."
                >目标资源不存在或已被移动。请检查 URL 路径，或通过下方按钮导航回安全区域。</span>
            </p>

            <div class="error-log">
                <div><span class="log-prefix">GET</span> <span id="currentUrl">/unknown-path</span> <span class="log-err">404</span></div>
                <div><span class="log-prefix">Server:</span> GitHub Pages</div>
                <div><span class="log-prefix">Time:</span> <span id="logTime">--</span></div>
                <div><span class="log-warn">WARN</span> <span class="lang-content" data-zh="路由匹配失败，建议返回首页" data-en="Route match failed. Consider returning to homepage.">路由匹配失败，建议返回首页</span></div>
            </div>

            <div class="btn-group">
                <a href="../../index.html" class="btn-primary">
                    <i class="fas fa-home"></i>
                    <span class="lang-content" data-zh="返回首页" data-en="Back Home">返回首页</span>
                </a>
                <a href="../blog.html" class="btn-secondary">
                    <i class="fas fa-book-open"></i>
                    <span class="lang-content" data-zh="浏览博客" data-en="Browse Blog">浏览博客</span>
                </a>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="simple-footer">
        <span>&copy; 2025 HealthJian &middot; <a href="../../index.html"><span class="lang-content" data-zh="返回主站" data-en="Back to Home">返回主站</span></a></span>
    </footer>

    <script>
    (function(){
        'use strict';

        /* ---- Particle Background ---- */
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let animId = null;

        function resizeCanvas(){
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticles(){
            resizeCanvas();
            const count = Math.min(Math.floor(window.innerWidth / 20), 50);
            particles = [];
            for(let i = 0; i < count; i++){
                particles.push({
                    x: Math.random()*canvas.width,
                    y: Math.random()*canvas.height,
                    r: Math.random()*1.8+0.6,
                    dx:(Math.random()-0.5)*0.35,
                    dy:(Math.random()-0.5)*0.35,
                    a: Math.random()*0.4+0.15
                });
            }
        }

        function drawParticles(){
            ctx.clearRect(0,0,canvas.width,canvas.height);
            const isDark = document.body.classList.contains('dark-mode');
            const rgb = isDark ? '90,200,250' : '0,122,255';

            for(const p of particles){
                ctx.beginPath();
                ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
                ctx.fillStyle = `rgba(${rgb},${p.a})`;
                ctx.fill();
                p.x += p.dx; p.y += p.dy;
                if(p.x<0||p.x>canvas.width) p.dx*=-1;
                if(p.y<0||p.y>canvas.height) p.dy*=-1;
            }

            for(let i=0;i<particles.length;i++){
                for(let j=i+1;j<particles.length;j++){
                    const dx=particles[i].x-particles[j].x;
                    const dy=particles[i].y-particles[j].y;
                    const d=Math.sqrt(dx*dx+dy*dy);
                    if(d<110){
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x,particles[i].y);
                        ctx.lineTo(particles[j].x,particles[j].y);
                        ctx.strokeStyle=`rgba(${rgb},${0.06*(1-d/110)})`;
                        ctx.lineWidth=0.5;
                        ctx.stroke();
                    }
                }
            }

            animId = requestAnimationFrame(drawParticles);
        }

        createParticles();
        drawParticles();

        let resizeTimer;
        window.addEventListener('resize',()=>{
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(()=>{
                if(animId) cancelAnimationFrame(animId);
                createParticles();
                drawParticles();
            },200);
        });

        /* ---- Error Log Info ---- */
        const urlEl = document.getElementById('currentUrl');
        if(urlEl) urlEl.textContent = window.location.pathname || '/404';

        function updateLogTime(){
            const el = document.getElementById('logTime');
            if(el) el.textContent = new Date().toISOString().replace('T',' ').slice(0,19)+' UTC';
        }
        updateLogTime();
        setInterval(updateLogTime, 1000);

        /* ---- Theme Toggle ---- */
        const themeBtn = document.getElementById('theme-toggle');
        const savedTheme = localStorage.getItem('404-theme');
        if(savedTheme === 'dark') document.body.classList.add('dark-mode');

        themeBtn.addEventListener('click',()=>{
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('404-theme',
                document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        });

        /* ---- Language Toggle ---- */
        const langBtn = document.getElementById('lang-toggle');
        let lang = 'zh';

        langBtn.addEventListener('click',()=>{
            lang = lang === 'zh' ? 'en' : 'zh';
            langBtn.querySelector('span').textContent =
                langBtn.querySelector('span').getAttribute('data-'+lang);

            document.querySelectorAll('.lang-content').forEach(el=>{
                const val = el.getAttribute('data-'+lang);
                if(val) el.textContent = val;
            });

            document.querySelectorAll('.menu a, .site-name').forEach(el=>{
                const val = el.getAttribute('data-'+lang);
                if(val) el.textContent = val;
            });
        });

    })();
    </script>
</body>
</html>
