    <!-- 交互逻辑脚本 -->
    <script>
        /* ==========================================
           1. 优化后的表情包粒子系统
           ========================================== */
        const emojis = ['😊', '😄', '🚀', '🌟', '😆', '😅', '🤣', '😂', '🙃', '😉', '🥳', '😍', '🤗', '🤩', '😜', '🤪', '👻', '👾', '👽', '🤖', '✨', '🎈', '🎉'];
        
        class EmojiParticle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.vx = (Math.random() - 0.5) * 3; // 降低初始速度使其更优雅
                this.vy = (Math.random() - 0.5) * 3;
                this.size = 35 + Math.random() * 25;
                this.emoji = emojis[Math.floor(Math.random() * emojis.length)];
                this.rotation = Math.random() * 360;
                this.rotSpeed = (Math.random() - 0.5) * 2;
                
                this.element = document.createElement('div');
                this.element.className = 'emoji';
                this.element.textContent = this.emoji;
                this.element.style.fontSize = this.size + 'px';
                document.getElementById('emojiContainer').appendChild(this.element);
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.rotation += this.rotSpeed;

                // 边界反弹 (增加一定缓冲避免卡死)
                if (this.x <= 0) { this.vx = Math.abs(this.vx); this.x = 0; }
                if (this.x >= window.innerWidth - this.size) { this.vx = -Math.abs(this.vx); this.x = window.innerWidth - this.size; }
                if (this.y <= 0) { this.vy = Math.abs(this.vy); this.y = 0; }
                if (this.y >= window.innerHeight - this.size) { this.vy = -Math.abs(this.vy); this.y = window.innerHeight - this.size; }

                // 使用 transform 合并位移和旋转，性能更好
                this.element.style.transform = `translate3d(${this.x}px, ${this.y}px, 0) rotate(${this.rotation}deg)`;
            }

            checkCollision(other) {
                const dx = this.x - other.x;
                const dy = this.y - other.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                const minDistance = (this.size + other.size) / 2;

                if (distance < minDistance) {
                    // 仅当两个粒子相互靠近时才发生碰撞反弹 (解决粘连问题)
                    const nx = dx / distance;
                    const ny = dy / distance;
                    const relativeVelocityX = this.vx - other.vx;
                    const relativeVelocityY = this.vy - other.vy;
                    const speed = relativeVelocityX * nx + relativeVelocityY * ny;

                    if (speed < 0) {
                        // 弹性碰撞交换速度
                        const tempVx = this.vx;
                        const tempVy = this.vy;
                        this.vx = other.vx;
                        this.vy = other.vy;
                        other.vx = tempVx;
                        other.vy = tempVy;
                    }
                }
            }
        }

        let particles = [];
        // 根据屏幕宽度调整粒子数量，避免移动端过卡
        const particleCount = window.innerWidth < 768 ? 10 : 20;

        function initParticles() {
            document.getElementById('emojiContainer').innerHTML = '';
            particles = [];
            for (let i = 0; i < particleCount; i++) {
                particles.push(new EmojiParticle());
            }
        }

        function animateParticles() {
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                for (let j = i + 1; j < particles.length; j++) {
                    particles[i].checkCollision(particles[j]);
                }
            }
            requestAnimationFrame(animateParticles);
        }

        initParticles();
        animateParticles();

        window.addEventListener('resize', () => {
            // 简单的防抖处理
            clearTimeout(window.resizeTimer);
            window.resizeTimer = setTimeout(initParticles, 300);
        });

        /* ==========================================
           2. 3D 卡片悬浮视差效果
           ========================================== */
        const card = document.getElementById('errorCard');
        document.addEventListener('mousemove', (e) => {
            if(window.innerWidth < 768) return; // 移动端禁用
            const xAxis = (window.innerWidth / 2 - e.pageX) / 40;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 40;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        document.addEventListener('mouseleave', () => {
            card.style.transform = `rotateY(0deg) rotateX(0deg)`;
        });

        /* ==========================================
           3. 页脚时钟
           ========================================== */
        function updateClock() {
            const now = new Date();
            document.getElementById('footerClock').textContent = 
                `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;
            
            document.getElementById('footerDate').textContent = 
                now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }
        updateClock();
        setInterval(updateClock, 1000);

        /* ==========================================
           4. 主题与语言切换逻辑 (独立完整版)
           ========================================== */
        const themeToggle = document.getElementById('theme-toggle');
        themeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            // 此处可添加 localStorage 保存逻辑
        });

        const langToggle = document.getElementById('lang-toggle');
        let currentLang = 'zh';
        
        langToggle.addEventListener('click', () => {
            currentLang = currentLang === 'zh' ? 'en' : 'zh';
            
            // 切换按钮文字
            const btnSpan = langToggle.querySelector('span');
            btnSpan.textContent = btnSpan.getAttribute(`data-${currentLang}`);

            // 切换页面所有带有 lang-content 类的文本
            document.querySelectorAll('.lang-content').forEach(el => {
                el.textContent = el.getAttribute(`data-${currentLang}`);
            });
            
            // 切换导航栏上特定属性的文本
            document.querySelectorAll('.menu a, .site-name').forEach(el => {
                if(el.hasAttribute(`data-${currentLang}`)) {
                    el.textContent = el.getAttribute(`data-${currentLang}`);
                }
            });
        });
    </script>
</body>
</html>
